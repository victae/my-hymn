<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 찬송가 보관함</title>
    <script src="hymn_data.js"></script>
    <style>
        /* 기본 스타일 및 모바일 최적화 */
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; text-align: center; margin: 0; padding: 0; background-color: #f0f2f5; color: #333; }
        .container { max-width: 600px; margin: 0 auto; min-height: 100vh; background-color: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        
        /* 상단 헤더 및 검색창 (고정) */
        .header { padding: 20px; background-color: #2c3e50; color: white; position: sticky; top: 0; z-index: 100; }
        .search-box { display: flex; gap: 10px; padding: 10px 20px; }
        input { flex: 1; padding: 15px; font-size: 18px; border: 2px solid #ddd; border-radius: 8px; outline: none; width: 100%; box-sizing: border-box; }
        input:focus { border-color: #3498db; }
        .search-btn { padding: 0 20px; font-size: 18px; background-color: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; }

        /* 검색 결과 목록 스타일 */
        #resultList { list-style: none; padding: 0; margin: 0; text-align: left; }
        #resultList li { padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; }
        #resultList li:hover { background-color: #f9f9f9; }
        #resultList li:active { background-color: #eaf4ff; }
        
        .hymn-info { font-size: 18px; font-weight: bold; color: #2c3e50; margin-bottom: 5px; }
        .lyrics-preview { font-size: 14px; color: #7f8c8d; line-height: 1.4; }
        .highlight { color: #e74c3c; font-weight: bold; background-color: #fff3f3; } /* 검색어 강조 */

        /* 이미지 표시 구역 */
        #imageSection { display: none; padding: 10px; background-color: #fff; }
        .back-btn { width: 100%; padding: 15px; font-size: 18px; background-color: #95a5a6; color: white; border: none; border-radius: 8px; margin-bottom: 15px; cursor: pointer; font-weight: bold; }
        img { width: 100%; height: auto; border-radius: 4px; border: 1px solid #ddd; margin-bottom: 10px; display: block; }
        
        .empty-msg { padding: 60px 20px; color: #999; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <div id="searchView">
        <div class="header">
            <h2 style="margin:0 0 15px 0;">🎶 찬송가 보관함</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="번호 / 제목 / 가사" onkeyup="if(event.keyCode==13) searchHymn()">
                <button class="search-btn" onclick="searchHymn()">검색</button>
            </div>
        </div>
        <ul id="resultList">
            <div class="empty-msg">
                찾으시는 찬송가의 번호, 제목, 가사를 입력해 주세요.<br>
                (예: 1, 만복의 근원, 삼위일체 등)
            </div>
        </ul>
    </div>

    <div id="imageSection">
        <button class="back-btn" onclick="showList()">⬅️ 리스트로 돌아가기</button>
        <div id="imageCanvas"></div>
    </div>
</div>

<script>
    /* [파일명 리스트] 여기에 태한님이 뽑으신 전체 목록을 붙여넣으세요! */
    const fileList = [
        "001장_만복의_근원_하나님.jpg",
        "615장_그_큰_일을_행하신_1.jpg",
        "615장_그_큰_일을_행하신_2.jpg",
        "635장_하늘에_계신(주기도문)_1.jpg",
        "635장_하늘에_계신(주기도문)_2.jpg"
        // ... (나머지 640여개 파일명들을 여기에 싹 붙여넣기)
    ];

    // 검색 로직
    function searchHymn() {
        const input = document.getElementById('searchInput');
        const query = input.value.trim();
        const resultList = document.getElementById('resultList');
        resultList.innerHTML = "";

        if (!query) return;

        // 공백 제거 후 검색 (사용자 편의성)
        const cleanQuery = query.replace(/ /g, "");

        // 1. 가사 데이터(hymnData)에서 통합 검색
        const filtered = hymnData.filter(item => {
            return item.no.includes(query) || 
                   item.title.replace(/ /g, "").includes(cleanQuery) || 
                   item.lyrics.replace(/ /g, "").includes(cleanQuery);
        });

        if (filtered.length === 0) {
            resultList.innerHTML = "<div class='empty-msg'>검색 결과가 없습니다.</div>";
            return;
        }

        // 2. 검색 결과 생성
        filtered.forEach(item => {
            const li = document.createElement('li');
            
            // 가사 미리보기 및 강조 표시
            let preview = item.lyrics;
            const startIdx = preview.replace(/ /g, "").indexOf(cleanQuery);
            
            if (startIdx > -1) {
                // 검색어가 발견된 위치를 찾아 앞뒤 가사 일부 추출
                preview = "..." + preview.substring(Math.max(0, startIdx - 10), startIdx + query.length + 20) + "...";
                // 검색어 빨간색으로 강조
                preview = preview.replace(new RegExp(query, 'gi'), `<span class="highlight">$&</span>`);
            } else {
                preview = preview.substring(0, 40) + "...";
            }

            li.innerHTML = `
                <div class="hymn-info">${item.no}장. ${item.title}</div>
                <div class="lyrics-preview">${preview}</div>
            `;

            // 클릭 시 해당 번호의 모든 이미지 세로로 출력
            li.onclick = () => showImage(item.no);
            resultList.appendChild(li);
        });
    }

    // 이미지 보기 함수 (세로 쌓기 모드)
    function showImage(hymnNo) {
        document.getElementById('searchView').style.display = 'none';
        document.getElementById('imageSection').style.display = 'block';
        const canvas = document.getElementById('imageCanvas');
        canvas.innerHTML = ""; // 기존 이미지 초기화

        // 번호를 001 형식으로 맞춤 (태한님의 파일명 규칙)
        const targetPrefix = hymnNo.padStart(3, '0') + "장";
        
        // fileList에서 해당 번호로 시작하는 모든 파일 찾아 정렬 (_1, _2 순서 보장)
        const matchedFiles = fileList.filter(f => f.startsWith(targetPrefix)).sort();

        if (matchedFiles.length === 0) {
            canvas.innerHTML = "<p style='padding:20px;'>해당 장의 악보 이미지를 찾을 수 없습니다.</p>";
        } else {
            // 찾은 모든 이미지를 순서대로 화면에 생성
            matchedFiles.forEach(fileName => {
                const img = document.createElement('img');
                const encodedName = encodeURIComponent(fileName);
                img.src = `images/${encodedName}`; // 이미지가 든 폴더가 images 일 경우
                canvas.appendChild(img);
            });
        }

        window.scrollTo(0, 0); // 화면 상단으로 이동
    }

    // 리스트로 돌아가기
    function showList() {
        document.getElementById('imageSection').style.display = 'none';
        document.getElementById('searchView').style.display = 'block';
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
