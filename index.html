    <style>
        /* [공통 스타일] */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow-x: hidden; background-color: #2c3e50; }
        .container { 
            width: 100%; min-height: 100vh; margin: 0; padding: 0;
            background-color: #fff; display: flex; flex-direction: column;
        }

        @media (min-width: 601px) {
            .container { width: 600px; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        }
        
        /* [헤더 디자인] */
        .header { 
            width: 100%; padding: 15px 15px 12px 15px; 
            background-color: #2c3e50; color: white; position: sticky; top: 0; z-index: 100;
        }
        .header h2 { margin: 0 0 10px 0; font-weight: 500; font-size: 18px; text-align: center; }
        .search-box { display: flex; gap: 8px; width: 100%; }
        input { 
            flex: 1; padding: 10px 14px; font-size: 16px; border: none; 
            border-radius: 8px; outline: none; background-color: #fff;
        }
        .search-btn { 
            padding: 0 18px; background-color: #34495e; color: white; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* [리스트 및 상세 화면] */
        #resultList { list-style: none; padding: 0; margin: 0; width: 100%; }
        #resultList li { padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 16px; }
        #imageSection { display: none; padding: 10px; width: 100%; }
        .back-btn { 
            width: 100%; padding: 12px; font-size: 16px; background-color: #95a5a6; 
            color: white; border: none; border-radius: 8px; margin-bottom: 10px; cursor: pointer; 
        }
        
        .audio-container { 
            margin-bottom: 12px; padding: 15px; background: #f8f9fa; 
            border-radius: 12px; border: 1px solid #eee; 
        }
        .audio-btns { display: flex; gap: 10px; margin-bottom: 10px; }
        .play-btn { flex: 1; padding: 12px; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; }
        
        img { width: 100%; height: auto; display: block; margin-bottom: 8px; }
        .empty-msg { padding: 80px 20px; color: #999; text-align: center; }
    </style>
</head>

let currentPlayingNo = ""; 

// [개선된 검색 로직: 다중 번호 파일 지원]
function searchHymn() {
    const input = document.getElementById('searchInput').value.trim().toLowerCase();
    const resultList = document.getElementById('resultList');
    resultList.innerHTML = ''; 
    if (!input) return;

    const filtered = fileList.filter(file => file.toLowerCase().includes(input));
    if (filtered.length === 0) {
        resultList.innerHTML = '<div class="empty-msg">검색 결과가 없습니다.</div>';
        return;
    }

    filtered.forEach(file => {
        // 파일명 내 모든 '숫자+장' 패턴 추출
        const matches = [...file.matchAll(/(\d+)장/g)];
        
        if (matches.length > 0) {
            // 검색어(input)가 숫자이고 파일에 포함된 번호 중 하나와 일치하면 그 번호를 사용
            const matchedNumber = matches.find(m => m[1] === input);
            const hymnNo = matchedNumber ? matchedNumber[1] : matches[0][1];

            const li = document.createElement('li');
            li.innerText = file.replace('.jpg', '').replace(/_/g, ' '); 
            li.onclick = () => showImage(hymnNo);
            resultList.appendChild(li);
        }
    });
}

// [개선된 이미지 표시 로직]
function showImage(hymnNo) {
    const canvas = document.getElementById('imageCanvas');
    const audio = document.getElementById('hymnAudio');
    canvas.innerHTML = ''; 
    
    // 재생할 번호 확정 (001 형식)
    currentPlayingNo = hymnNo.padStart(3, '0');

    if (audio) {
        audio.pause();
        audio.src = "";
        audio.style.display = 'none';
        document.getElementById('audioStatus').innerText = "모드를 선택해 주세요.";
    }

    // 파일명이 해당 번호를 포함하고 있는지 확인 (단순 포함이 아닌 '번호+장' 형태 매칭)
    const targetFiles = fileList.filter(file => file.includes(hymnNo + "장"));

    if (targetFiles.length > 0) {
        targetFiles.forEach(fileName => {
            const img = document.createElement('img');
            img.src = `images/${fileName}`;
            canvas.appendChild(img);
        });
        document.getElementById('searchView').style.display = 'none';
        document.getElementById('imageSection').style.display = 'block';
        window.scrollTo(0, 0); 
    }
}

function playHymn(type) {
    const audio = document.getElementById('hymnAudio');
    const status = document.getElementById('audioStatus');
    const baseUrl = "https://pub-3e09c4a7bdce410d81cd2b400a526c9f.r2.dev"; 
    const fileUrl = `${baseUrl}/AUDIO/${type}/${currentPlayingNo}.mp3`;
    
    audio.src = fileUrl;
    audio.style.display = 'block';
    status.innerText = "로딩 중...";
    audio.play().then(() => {
        status.innerText = (type === 'SING' ? "🎤 찬양" : "🎹 반주") + " 재생 중";
    }).catch(() => {
        status.innerText = "❌ 음원을 불러올 수 없습니다.";
        audio.style.display = 'none';
    });
}

function showList() {
    const audio = document.getElementById('hymnAudio');
    if (audio) audio.pause();
    document.getElementById('imageSection').style.display = 'none';
    document.getElementById('searchView').style.display = 'block';
}
