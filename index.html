<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>찬송가</title>

    <meta name="apple-mobile-web-app-title" content="찬송가">
    <link rel="apple-touch-icon" href="images/icon.png">
    <link rel="icon" type="image/png" href="images/icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2c3e50">

    <style>
        /* 1. 기본 초기화: 여백을 없애고 픽셀 계산 방식을 고정합니다 */
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; 
            background-color: #f0f2f5; 
            color: #333; 
            -webkit-tap-highlight-color: transparent;
        }

        /* 2. 컨테이너: 가로 100%를 쓰되, PC에서는 600px로 제한합니다 */
        .container { 
            width: 100%;
            max-width: 600px; 
            margin: 0 auto; 
            min-height: 100vh; 
            background-color: #fff; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
        }
        
        /* 3. 헤더 디자인 (아이콘 색상과 통일) */
        .header { 
            padding: 15px 15px 12px 15px; 
            background-color: #2c3e50; 
            color: white; 
            position: sticky; 
            top: 0; 
            z-index: 100;
        }
        .header h2 { 
            margin: 0 0 10px 0; 
            font-weight: 500; 
            font-size: 18px; 
            letter-spacing: -0.5px;
        }

        .search-box { display: flex; gap: 8px; }
        input { 
            flex: 1; 
            padding: 10px 14px; 
            font-size: 16px; 
            border: none; 
            border-radius: 8px; 
            outline: none; 
            background-color: rgba(255,255,255,0.95);
        }
        .search-btn { 
            padding: 0 15px; 
            font-size: 15px; 
            background-color: #34495e; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
        }

        /* 4. 리스트 컴팩트 디자인 */
        #resultList { list-style: none; padding: 0; margin: 0; text-align: left; }
        #resultList li { 
            padding: 14px 20px; 
            border-bottom: 1px solid #f2f2f2; 
            cursor: pointer; 
            font-size: 16px;
        }
        #resultList li:active { background-color: #f9f9f9; }

        /* 5. 상세 화면 및 오디오 영역 */
        #imageSection { display: none; padding: 10px; }
        .back-btn { 
            width: 100%; padding: 12px; font-size: 16px; 
            background-color: #95a5a6; color: white; border: none; 
            border-radius: 8px; margin-bottom: 10px; cursor: pointer; 
        }
        
        .audio-container { 
            margin-bottom: 12px; padding: 12px; 
            background: #fdfdfd; border-radius: 10px; border: 1px solid #eee; 
        }
        .audio-btns { display: flex; gap: 8px; margin-bottom: 8px; }
        .play-btn { 
            flex: 1; padding: 10px; color: white; border: none; 
            border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; 
        }
        
        img { width: 100%; height: auto; margin-bottom: 8px; display: block; }
        .empty-msg { padding: 60px 20px; color: #bbb; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div id="searchView">
        <div class="header">
            <h2>찬송가 보관함</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="번호 또는 제목을 입력하세요" onkeyup="if(event.keyCode==13) searchHymn()">
                <button class="search-btn" onclick="searchHymn()">검색</button>
            </div>
        </div>
        <ul id="resultList">
            <div class="empty-msg">원하는 곡을 검색해 보세요.</div>
        </ul>
    </div>

    <div id="imageSection">
        <button class="back-btn" onclick="showList()">⬅️ 목록으로 돌아가기</button>
        <div class="audio-container">
            <div class="audio-btns">
                <button class="play-btn" style="background-color: #27ae60;" onclick="playHymn('SING')">🎤 찬양 듣기</button>
                <button class="play-btn" style="background-color: #2980b9;" onclick="playHymn('INST')">🎹 반주 듣기</button>
            </div>
            <audio id="hymnAudio" controls style="width: 100%; display: none;"></audio>
            <p id="audioStatus" style="font-size: 12px; color: #999; margin: 0; text-align: center;">모드를 선택해 주세요.</p>
        </div>
        <div id="imageCanvas"></div>
    </div>
</div>

<script>
// [1. 데이터 리스트]
const fileList = [
    "001장_만복의_근원_하나님.jpg",
    "002장_찬양_성부_성자_성령.jpg",
    "003장_성부_성자와_성령.jpg",
    "135장_어저께나_오늘이나.jpg",
    "645장_아멘.jpg"
    // 여기에 나머지 리스트를 붙여넣으세요.
];

let currentPlayingNo = ""; 

// [2. 검색 로직]
function searchHymn() {
    const input = document.getElementById('searchInput').value.trim().toLowerCase();
    const resultList = document.getElementById('resultList');
    resultList.innerHTML = ''; 
    if (!input) return;

    const filtered = fileList.filter(file => file.toLowerCase().includes(input));
    if (filtered.length === 0) {
        resultList.innerHTML = '<div class="empty-msg">검색 결과가 없습니다.</div>';
        return;
    }

    filtered.forEach(file => {
        const match = file.match(/(\d+)장/);
        if (match) {
            const hymnNo = match[1];
            const li = document.createElement('li');
            li.innerText = file.replace('.jpg', '').replace(/_/g, ' '); 
            li.onclick = () => showImage(hymnNo);
            resultList.appendChild(li);
        }
    });
}

// [3. 화면 전환 및 이미지 로딩]
function showImage(hymnNo) {
    const canvas = document.getElementById('imageCanvas');
    const audio = document.getElementById('hymnAudio');
    canvas.innerHTML = ''; 
    currentPlayingNo = hymnNo.padStart(3, '0');

    if (audio) {
        audio.pause();
        audio.src = "";
        audio.style.display = 'none';
        document.getElementById('audioStatus').innerText = "모드를 선택해 주세요.";
    }

    const targetFiles = fileList.filter(file => 
        file.startsWith(hymnNo.padStart(3, '0') + "장") || 
        file.startsWith(hymnNo.replace(/^0+/, '') + "장")
    );

    if (targetFiles.length > 0) {
        targetFiles.forEach(fileName => {
            const img = document.createElement('img');
            img.src = `images/${fileName}`;
            canvas.appendChild(img);
        });
        document.getElementById('searchView').style.display = 'none';
        document.getElementById('imageSection').style.display = 'block';
        window.scrollTo(0, 0); 
    }
}

// [4. 오디오 재생 (R2 연결)]
function playHymn(type) {
    const audio = document.getElementById('hymnAudio');
    const status = document.getElementById('audioStatus');
    const baseUrl = "https://pub-3e09c4a7bdce410d81cd2b400a526c9f.r2.dev"; 
    const fileUrl = `${baseUrl}/AUDIO/${type}/${currentPlayingNo}.mp3`;
    
    audio.src = fileUrl;
    audio.style.display = 'block';
    status.innerText = "로딩 중...";
    
    audio.play().then(() => {
        status.innerText = (type === 'SING' ? "🎤 찬양" : "🎹 반주") + " 재생 중";
    }).catch(() => {
        status.innerText = "❌ 음원을 불러올 수 없습니다.";
        audio.style.display = 'none';
    });
}

// [5. 리스트로 복귀]
function showList() {
    const audio = document.getElementById('hymnAudio');
    if (audio) audio.pause();
    document.getElementById('imageSection').style.display = 'none';
    document.getElementById('searchView').style.display = 'block';
}
</script>
</body>
</html>
